name: home-ops

services:
  postgres:
    build: ./postgres
    restart: unless-stopped
    # pg_cron requires shared_preload_libraries + a designated database for the cron schema.
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=home_ops
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (run scripts/generate-env.sh)}
      POSTGRES_DB: home_ops
    ports:
      - "127.0.0.1:64422:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d home_ops"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingest:
    build: ./ingest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/home_ops
      INGEST_TOKEN: ${INGEST_TOKEN:?INGEST_TOKEN required (run scripts/generate-env.sh)}
      LOGS_PASSWORD: ${LOGS_PASSWORD:?LOGS_PASSWORD required (run scripts/generate-env.sh)}
      # Set AUTH_PUBLIC=1 in .env to open the console with no viewer login
      # (worker/token endpoints stay protected). Reachable over LAN + Tailscale.
      AUTH_PUBLIC: ${AUTH_PUBLIC:-}
      PORT: "8080"
    ports:
      - "0.0.0.0:64421:8080"
    healthcheck:
      # /api/health is public (no auth) and runs SELECT 1 against the pool —
      # proves both the HTTP server and Postgres reachability in one probe.
      # node:24-alpine ships busybox wget; no extra deps.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health | grep -q '\"ok\":true' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Viewer is served by the same Hono process as ingest. No second container.

volumes:
  pgdata:
