<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>home-ops · logs</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="bar">
    <strong>home-ops</strong>
    <div class="filters">
      <select id="host" multiple title="host"></select>
      <select id="source" multiple title="source"></select>
      <select id="level_min" title="min level">
        <option value="debug">debug+</option>
        <option value="info" selected>info+</option>
        <option value="warn">warn+</option>
        <option value="error">error+</option>
        <option value="fatal">fatal</option>
      </select>
      <select id="since_min" title="window">
        <option value="5">5m</option>
        <option value="15">15m</option>
        <option value="60" selected>1h</option>
        <option value="1440">24h</option>
        <option value="10080">7d</option>
      </select>
      <input id="grep" type="search" placeholder="grep…" autocomplete="off">
      <label class="tail"><input id="tail" type="checkbox" checked> tail</label>
      <button id="refresh">↻</button>
      <span id="status" class="status"></span>
      <button id="logout" title="log out">×</button>
    </div>
  </header>

  <main>
    <table id="t">
      <thead>
        <tr>
          <th class="c-ts">ts</th>
          <th class="c-host">host</th>
          <th class="c-source">source</th>
          <th class="c-level">lvl</th>
          <th class="c-msg">message</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>

<script src="/static/app.js"></script>
</body>
</html>
